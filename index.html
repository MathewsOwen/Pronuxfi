<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeVision | Terminal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        :root {
            --bg: #020408; --surface: #0a0e14; --accent: #00ffc3;
            --danger: #ff4655; --text: #f8fafc; --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }

        /* Ticker Superior de Atualizações em Tempo Real */
        .live-ticker { background: #000; border-bottom: 1px solid var(--border); padding: 8px 0; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); overflow: hidden; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: move 40s linear infinite; }
        @keyframes move { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        header { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); }
        .logo { font-size: 20px; font-weight: 800; color: var(--text); text-decoration: none; }
        .logo span { color: var(--accent); }

        .container { display: flex; height: calc(100vh - 95px); position: relative; }

        /* Sidebar Esquerda */
        aside { width: 220px; background: var(--surface); padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; }
        .nav-btn { width: 100%; padding: 12px; background: transparent; border: none; color: var(--text-dim); text-align: left; cursor: pointer; border-radius: 8px; font-weight: 600; margin-bottom: 5px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); background: rgba(0,255,195,0.05); }

        /* Área Central */
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }

        /* CARDS COM GRÁFICO NO HOVER */
        .card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: var(--accent); background: #0c111a; }
        
        /* O Gráfico que aparece no Hover */
        .hover-chart {
            position: absolute;
            bottom: -100px; left: 0; width: 100%; height: 80px;
            opacity: 0; transition: 0.4s; pointer-events: none;
            filter: grayscale(1) brightness(1.5);
        }
        .card:hover .hover-chart { bottom: 0; opacity: 0.6; }

        .symbol { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 11px; margin-bottom: 5px; display: block; }
        .price { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
        .badge { font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
        .up { background: rgba(0,255,195,0.1); color: var(--accent); }
        .down { background: rgba(255,70,85,0.1); color: var(--danger); }

        /* SIDEBAR DE NOTÍCIAS (HOVER) */
        .news-sidebar {
            width: 40px; background: var(--surface); border-left: 1px solid var(--border);
            height: 100%; transition: width 0.4s ease; position: relative; overflow: hidden; display: flex;
        }
        .news-sidebar:hover { width: 380px; }
        .news-indicator { min-width: 40px; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; }
        .news-indicator span { transform: rotate(90deg); white-space: nowrap; font-size: 10px; color: var(--accent); letter-spacing: 2px; }
        
        .news-content { padding: 25px; min-width: 340px; opacity: 0; transition: 0.3s; overflow-y: auto; }
        .news-sidebar:hover .news-content { opacity: 1; }
        
        .news-item { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .news-date { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--text-dim); margin-bottom: 4px; display: block; }
        .news-text { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text); }
        .news-src { color: var(--accent); font-size: 10px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="live-ticker">
    <div class="ticker-move" id="live-price-ticker">
        CARREGANDO ATUALIZAÇÕES DO MERCADO...
    </div>
</div>

<header>
    <a href="#" class="logo">Trade<span>Vision</span></a>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-dim)">00:00:00</div>
</header>

<div class="container">
    <aside id="menu-side"></aside>

    <main>
        <div class="grid" id="market-grid"></div>
    </main>

    <div class="news-sidebar">
        <div class="news-indicator"><span>MERCADO GLOBAL</span></div>
        <div class="news-content">
            <h3 style="font-size: 11px; margin-bottom: 20px; color: var(--accent);">HISTÓRICO E NOTÍCIAS</h3>
            <div id="news-list"></div>
        </div>
    </div>
</div>

<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    
    // Lista de Notícias ampliada (Dias anteriores)
    const newsData = [
        { date: "HOJE 10:45", src: "REUTERS", text: "Inflação nos EUA vem abaixo do esperado; mercados reagem com alta." },
        { date: "HOJE 08:30", src: "BLOOMBERG", text: "NVIDIA ultrapassa Apple em valor de mercado após rali de IA." },
        { date: "ONTEM", src: "CNBC", text: "Petróleo fecha em queda com aumento de estoques nos terminais de Cushing." },
        { date: "08 MAR", src: "INVESTING", text: "Bancos europeus reportam lucros recordes no primeiro bimestre de 2024." },
        { date: "07 MAR", src: "FINANCIAL TIMES", text: "Tensões comerciais entre China e UE afetam setor automotivo." },
        { date: "06 MAR", src: "TRADEVISION", text: "Fluxo de capital institucional migra para ativos de cibersegurança." }
    ];

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    function renderNews() {
        document.getElementById('news-list').innerHTML = newsData.map(n => `
            <div class="news-item">
                <span class="news-date">${n.date}</span>
                <p class="news-text">${n.text}</p>
                <span class="news-src">FONTE: ${n.src}</span>
            </div>
        `).join('');
    }

    async function update() {
        try {
            const r = await fetch(CSV);
            const t = await r.text();
            const store = t.split('\n').slice(1).map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { t: c[0]?.replace(/"/g, '').trim(), n: c[1]?.replace(/"/g, ''), p: c[2], v: c[3]?.trim(), s: c[4]?.trim() };
            }).filter(i => i.t && !i.t.includes('#N/A'));
            
            window.marketData = store;
            updateLiveTicker(store);
            render(document.querySelector('.nav-btn.active')?.innerText || "TECNOLOGIA");
        } catch(e) {}
    }

    function updateLiveTicker(data) {
        const ticker = document.getElementById('live-price-ticker');
        const content = data.map(i => `${i.t}: R$ ${i.p} (${i.v})`).join('  //  ');
        ticker.innerText = `+++ ULTIMAS ATUALIZAÇÕES: ${content} +++`;
    }

    function render(sName) {
        const g = document.getElementById('market-grid');
        g.innerHTML = '';
        const filtered = window.marketData.filter(i => i.s && i.s.toLowerCase() === sName.toLowerCase());
        
        filtered.forEach(i => {
            const up = !i.v.includes('-');
            // Gerador de imagem de gráfico do TradingView baseado no ticker
            const chartUrl = `https://s3.tradingview.com/generated_chart_images/s_${i.t}.png`;

            g.innerHTML += `
                <div class="card">
                    <span class="symbol">${i.t}</span>
                    <div class="price">R$ ${i.p}</div>
                    <div style="font-size:12px; color:var(--text-dim); margin-bottom:12px">${i.n}</div>
                    <span class="badge ${up ? 'up' : 'down'}">${i.v}</span>
                    
                    <img class="hover-chart" src="${chartUrl}" onerror="this.style.display='none'">
                </div>
            `;
        });
    }

    const menu = document.getElementById('menu-side');
    sectors.forEach((s, idx) => {
        const b = document.createElement('button');
        b.className = `nav-btn ${idx === 0 ? 'active' : ''}`;
        b.innerText = s.toUpperCase();
        b.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            render(s);
        };
        menu.appendChild(b);
    });

    update();
    renderNews();
    setInterval(update, 30000); // Atualiza dados da planilha a cada 30 segundos
</script>
</body>
</html>
