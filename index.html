<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMARKETCAP | Global Intelligence Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0d1117;
            --accent: #00f2ff; /* Ciano Elétrico */
            --up: #00ff88;     /* Verde Dopamina */
            --down: #ff3366;   /* Rosa Alerta */
            --text: #f0f3f5;
            --text-dim: #848e9c;
            --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a1118 0%, #000 100%);
        }

        /* HEADER & TICKER */
        header { 
            background: #000; 
            padding: 15px 30px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .ticker-wrap { background: #000; border-bottom: 1px solid var(--border); padding: 8px 0; overflow: hidden; }
        .ticker { 
            display: inline-block; 
            white-space: nowrap; 
            animation: scroll 60s linear infinite; 
            font-family: 'JetBrains Mono'; 
            font-size: 11px; 
            color: var(--up); 
            letter-spacing: 1px;
        }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { display: flex; height: calc(100vh - 105px); }

        /* SIDEBAR NAVEGAÇÃO */
        aside { width: 200px; padding: 20px; border-right: 1px solid var(--border); background: #05070a; }
        .nav-item { 
            padding: 12px; color: var(--text-dim); cursor: pointer; font-size: 11px; 
            font-weight: 700; border-radius: 4px; margin-bottom: 5px; 
            text-transform: uppercase; transition: 0.2s; letter-spacing: 0.5px;
        }
        .nav-item:hover { color: #fff; background: #161b22; }
        .nav-item.active { background: #1e2329; color: var(--accent); border-left: 3px solid var(--accent); }

        /* GRID PRINCIPAL */
        main { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }

        .card { 
            background: var(--surface); border-radius: 10px; padding: 20px; 
            border: 1px solid var(--border); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: crosshair; position: relative;
        }
        .card:hover { border-color: var(--accent); background: #161b22; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .symbol { color: var(--accent); font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; font-family: 'JetBrains Mono'; }
        .price { font-size: 26px; font-weight: 700; margin-bottom: 12px; font-family: 'JetBrains Mono'; letter-spacing: -1px; }
        .change { font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 4px; }
        .pos { color: var(--up); background: rgba(0, 255, 136, 0.1); }
        .neg { color: var(--down); background: rgba(255, 51, 102, 0.1); }

        /* BARRA DE NOTÍCIAS MUNDIAIS */
        .world-news { width: 340px; border-left: 1px solid var(--border); background: #05070a; display: flex; flex-direction: column; }
        .news-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .news-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .news-card { margin-bottom: 22px; padding-bottom: 15px; border-bottom: 1px solid #1a1d23; transition: 0.2s; }
        .news-tag { font-size: 9px; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .news-headline { font-size: 13px; font-weight: 600; line-height: 1.5; color: #fff; text-decoration: none; display: block; }
        .news-headline:hover { color: var(--accent); }
        .news-meta { font-size: 10px; color: #444; margin-top: 8px; font-family: 'JetBrains Mono'; }

        /* TOOLTIP DO ÍNDICE (COLUNA F) */
        #company-info { 
            position: fixed; display: none; width: 280px; background: rgba(13, 17, 23, 0.98); 
            border: 1px solid var(--accent); border-radius: 8px; padding: 15px; 
            z-index: 9999; pointer-events: none; backdrop-filter: blur(12px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        .info-title { color: var(--accent); font-weight: 800; font-size: 14px; margin-bottom: 6px; text-transform: uppercase; }
        .info-desc { font-size: 12px; color: #f0f3f5; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="real-clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-dim)">00:00:00</div>
</header>

<div class="ticker-wrap"><div class="ticker" id="ticker-feed">SINCRONIZANDO COM A REDE ALPHA GLOBAL...</div></div>

<div class="container">
    <aside id="side-menu"></aside>
    
    <main>
        <div class="grid" id="main-grid"></div>
        <div id="company-info">
            <div class="info-title" id="tt-name"></div>
            <div class="info-desc" id="tt-desc"></div>
        </div>
    </main>

    <section class="world-news">
        <div class="news-header">🌍 World Intelligence Feed</div>
        <div class="news-scroll" id="world-feed">
            <div style="color:#444; font-size:12px">Buscando manchetes globais...</div>
        </div>
    </section>
</div>

<script>
    // URL DA SUA PLANILHA (CSV)
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    
    // Função para limpar aspas e lixo das células
    function sanitize(val) { return val ? val.toString().replace(/["']/g, "").trim() : ""; }

    // 1. CARREGAR NOTÍCIAS DO MUNDO (Google News via RSS2JSON)
    async function loadWorldNews() {
        const feedContainer = document.getElementById('world-feed');
        const GOOGLE_NEWS_RSS = "https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt-419";
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(GOOGLE_NEWS_RSS)}`;

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            if (data.status === 'ok') {
                feedContainer.innerHTML = data.items.map(item => `
                    <div class="news-card">
                        <span class="news-tag">TRENDING</span>
                        <a href="${item.link}" target="_blank" class="news-headline">${item.title}</a>
                        <div class="news-meta">SOURCE: ${item.author || 'GLOBAL FEED'} // ${new Date(item.pubDate).toLocaleTimeString()}</div>
                    </div>
                `).join('');
            }
        } catch (e) {
            feedContainer.innerHTML = "<div style='color:var(--down); font-size:11px'>Erro ao sincronizar notícias globais.</div>";
        }
    }

    // 2. CARREGAR DADOS DA PLANILHA (Google Sheets)
    async function fetchData() {
        try {
            const r = await fetch(SHEET_URL);
            const text = await r.text();
            const rows = text.split(/\r?\n/).slice(1);
            
            window.stocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    ticker: sanitize(cols[0]), 
                    name: sanitize(cols[1]), 
                    price: sanitize(cols[2]), 
                    pct: sanitize(cols[3]), 
                    sector: sanitize(cols[4]), 
                    desc: sanitize(cols[5]) // Lendo sua nova Coluna F
                };
            }).filter(s => s.ticker && s.ticker !== "");

            updateTicker();
            const activeSector = document.querySelector('.nav-item.active')?.innerText || "TECNOLOGIA";
            renderGrid(activeSector);
        } catch (e) { console.error("Planilha Error:", e); }
    }

    // 3. RENDERIZAR GRID DE CARDS
    function renderGrid(sectorName) {
        const container = document.getElementById('main-grid');
        container.innerHTML = '';
        const filtered = window.stocks.filter(s => s.sector.toUpperCase() === sectorName.toUpperCase());

        filtered.forEach(s => {
            const isPos = !s.pct.includes('-');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="symbol">${s.ticker}</span>
                <div class="price">R$ ${s.price}</div>
                <span class="change ${isPos ? 'pos' : 'neg'}">${isPos ? '▲' : '▼'} ${s.pct}</span>
            `;

            // Lógica do Tooltip (Índice da Coluna F)
            card.onmousemove = (e) => {
                const tt = document.getElementById('company-info');
                document.getElementById('tt-name').innerText = s.name;
                document.getElementById('tt-desc').innerText = s.desc || "Informação estratégica em processamento...";
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 15) + 'px';
                tt.style.top = (e.clientY + 15) + 'px';
            };
            card.onmouseleave = () => { document.getElementById('company-info').style.display = 'none'; };
            
            container.appendChild(card);
        });
    }

    // 4. ATUALIZAR BARRA ROLANTE (TICKER)
    function updateTicker() {
        const feed = window.stocks.map(s => `${s.ticker}: R$ ${s.price}`).slice(0, 20).join('  ///  ');
        document.getElementById('ticker-feed').innerText = `+++ ALPHA GLOBAL FEED: ${feed} +++`;
    }

    // 5. INICIALIZAR MENU LATERAL
    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    const menu = document.getElementById('side-menu');
    sectors.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `nav-item ${i === 0 ? 'active' : ''}`;
        div.innerText = s.toUpperCase();
        div.onclick = function() {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            renderGrid(s);
        };
        menu.appendChild(div);
    });

    // 6. LOOP DE ATUALIZAÇÃO
    fetchData();
    loadWorldNews();
    setInterval(fetchData, 60000);    // Planilha: 1 em 1 min
    setInterval(loadWorldNews, 300000); // Notícias: 5 em 5 min
    setInterval(() => { 
        document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); 
    }, 1000);
</script>
</body>
</html>
