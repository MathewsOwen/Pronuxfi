<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pronuxfin | Inteligência Financeira</title>
  <meta name="description" content="Dados, mercado e inteligência financeira em um só lugar.">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <div class="logo">PRONUXFIN</div>
  <nav>
    <a href="#">Mercados</a>
    <a href="#">Ações</a>
    <a href="#">Cripto</a>
    <a href="#">Notícias</a>
  </nav>
</header>

<section class="hero">
  <h1>Onde entendimento vira vantagem</h1>
  <p>Dados, contexto e leitura de mercado em um só lugar</p>
</section>

<section class="container">

  <div class="grid">

    <div class="card">
      <h2>🌎 Mercados Globais</h2>
      <table id="marketsTable"></table>
    </div>

    <div class="card">
      <h2>📈 Ações (B3)</h2>
      <table id="stocksTable"></table>
    </div>

    <div class="card">
      <h2>₿ Criptomoedas</h2>
      <table id="cryptoTable"></table>
    </div>

    <div class="card">
      <h2>📰 Notícias</h2>
      <div id="newsContainer"></div>
    </div>

  </div>

</section>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/markets.js"></script>
<script src="js/stocks.js"></script>
<script src="js/crypto.js"></script>
<script src="js/news.js"></script>

</body>
</html>
