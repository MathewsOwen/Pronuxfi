<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMARKETCAP | The Alpha Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0e14;
            --accent: #00ffc3; /* Verde Elétrico */
            --danger: #ff0055; /* Rosa Neon */
            --gold: #ffcc00;   /* Destaque Alpha */
            --text: #ffffff;
            --text-dim: #64748b;
            --border: rgba(0, 255, 195, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a1118 0%, #000 100%);
        }

        /* Ticker Superior Limpo */
        .live-ticker { 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            padding: 12px 0; 
            font-family: 'JetBrains Mono'; 
            font-size: 11px; 
            color: var(--accent); 
            overflow: hidden;
            letter-spacing: 1px;
        }
        .ticker-move { display: inline-block; white-space: nowrap; animation: ticker-scroll 60s linear infinite; }
        @keyframes ticker-scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        header { 
            padding: 15px 30px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .container { display: flex; height: calc(100vh - 100px); }

        /* Menu Lateral */
        aside { width: 220px; background: rgba(0,0,0,0.4); padding: 20px; border-right: 1px solid var(--border); }
        .nav-btn { 
            width: 100%; padding: 12px; background: transparent; border: none; 
            color: var(--text-dim); text-align: left; cursor: pointer; 
            font-weight: 700; margin-bottom: 5px; transition: 0.3s; font-size: 11px;
            border-radius: 6px; text-transform: uppercase;
        }
        .nav-btn.active { color: #000; background: var(--accent); box-shadow: 0 0 15px rgba(0, 255, 195, 0.3); }

        /* Grid de Cards */
        main { flex: 1; padding: 25px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }

        .card { 
            background: #0d1117; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 22px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); background: #121821; }
        
        /* Sparkline no Hover */
        .hover-chart {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            opacity: 0; transition: 0.4s; pointer-events: none;
            filter: hue-rotate(140deg) brightness(1.5);
        }
        .card:hover .hover-chart { opacity: 0.4; }

        .symbol { font-family: 'JetBrains Mono'; color: var(--accent); font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; }
        .price { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        .stock-name { font-size: 11px; color: var(--text-dim); margin-bottom: 15px; height: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .badge { 
            font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 4px; 
            display: inline-flex; align-items: center; gap: 5px;
        }
        .up { background: rgba(0, 255, 195, 0.1); color: var(--accent); }
        .down { background: rgba(255, 0, 85, 0.1); color: var(--danger); }

        /* Barra de Notícias Lateral */
        .news-sidebar {
            width: 45px; background: #05070a; border-left: 1px solid var(--border);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .news-sidebar:hover { width: 380px; }
        .news-indicator { height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .news-indicator span { transform: rotate(90deg); white-space: nowrap; font-size: 10px; color: var(--gold); font-weight: 800; letter-spacing: 3px; }

        .news-content { padding: 25px; opacity: 0; transition: 0.2s; visibility: hidden; width: 335px; }
        .news-sidebar:hover .news-content { opacity: 1; visibility: visible; }

        .folder-header { font-size: 11px; font-weight: 800; color: var(--gold); margin-bottom: 20px; letter-spacing: 1px; border-bottom: 1px solid rgba(255,204,0,0.2); padding-bottom: 10px; }
        .news-item { margin-bottom: 15px; border-left: 2px solid var(--accent); padding-left: 12px; }
        .news-time { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); }
        .news-text { font-size: 13px; font-weight: 600; margin-top: 4px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="live-ticker">
    <div class="ticker-move" id="live-ticker-inner">CARREGANDO DADOS ALPHA...</div>
</div>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 13px; color: var(--gold);">00:00:00</div>
</header>

<div class="container">
    <aside id="menu-side"></aside>
    <main>
        <div class="grid" id="market-grid"></div>
    </main>
    <div class="news-sidebar">
        <div class="news-indicator"><span>PREMIUM INTELLIGENCE</span></div>
        <div class="news-content">
            <div class="folder-header">📁 TODAY'S MARKET NEWS</div>
            <div id="today-news"></div>
        </div>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    
    // Função para limpar sujeira nos textos (aspas, espaços extras)
    function clean(text) {
        if (!text) return "";
        return text.replace(/"/g, '').trim();
    }

    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString(); 
    }, 1000);

    async function loadData() {
        try {
            const response = await fetch(CSV_URL);
            const dataText = await response.text();
            const rows = dataText.split('\n').slice(1);
            
            window.allStocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    ticker: clean(cols[0]),
                    name: clean(cols[1]),
                    price: clean(cols[2]),
                    change: clean(cols[3]),
                    sector: clean(cols[4])
                };
            }).filter(s => s.ticker && s.ticker !== "" && !s.ticker.includes('#N/A'));

            updateTicker();
            const currentSector = document.querySelector('.nav-btn.active')?.innerText || "TECNOLOGIA";
            renderGrid(currentSector);
        } catch (e) { console.error("Erro Alpha:", e); }
    }

    function updateTicker() {
        const tickerDiv = document.getElementById('live-ticker-inner');
        const text = window.allStocks.map(s => `${s.ticker}: R$ ${s.price} [${s.change}]`).join('  ///  ');
        tickerDiv.innerText = `+++ ALPHA FEED: ${text} +++`;
    }

    function renderGrid(sectorName) {
        const grid = document.getElementById('market-grid');
        grid.innerHTML = '';
        const filtered = window.allStocks.filter(s => s.sector.toLowerCase() === sectorName.toLowerCase());

        filtered.forEach(s => {
            const isUp = !s.change.includes('-');
            const chartUrl = `https://s3.tradingview.com/generated_chart_images/s_${s.ticker}.png`;

            grid.innerHTML += `
                <div class="card">
                    <span class="symbol">${s.ticker}</span>
                    <div class="price">R$ ${s.price}</div>
                    <div class="stock-name">${s.name}</div>
                    <span class="badge ${isUp ? 'up' : 'down'}">${isUp ? '🚀' : '📉'} ${s.change}</span>
                    <img class="hover-chart" src="${chartUrl}">
                </div>
            `;
        });
    }

    // Criar botões do menu
    const menuContainer = document.getElementById('menu-side');
    sectors.forEach((sec, index) => {
        const btn = document.createElement('button');
        btn.className = `nav-btn ${index === 0 ? 'active' : ''}`;
        btn.innerText = sec.toUpperCase();
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid(sec);
        };
        menuContainer.appendChild(btn);
    });

    // Mock de notícias
    document.getElementById('today-news').innerHTML = `
        <div class="news-item">
            <span class="news-time">14:05</span>
            <p class="news-text">Fluxo comprador atinge ativos de IA no setor de Tecnologia.</p>
        </div>
        <div class="news-item">
            <span class="news-time">11:20</span>
            <p class="news-text">ALPHAMARKETCAP detecta suporte em Commodities.</p>
        </div>
    `;

    loadData();
    setInterval(loadData, 30000); // Atualiza a cada 30 segundos
</script>
</body>
</html>
