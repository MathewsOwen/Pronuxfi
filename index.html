<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeVision — Market Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080f; --surface: #0c1220; --border: #1e2d45;
            --accent: #00d4aa; --danger: #ef4444; --text: #e8edf5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        
        .ticker-wrap { background: var(--accent); color: #000; padding: 10px 0; font-weight: 800; font-size: 13px; overflow: hidden; white-space: nowrap; position: sticky; top: 0; z-index: 1000; }
        .ticker { display: inline-block; animation: ticker 40s linear infinite; }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        header { padding: 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5, 8, 15, 0.8); backdrop-filter: blur(10px); }
        .logo h1 { font-family: 'Syne'; font-size: 32px; letter-spacing: -1px; text-transform: uppercase; }
        .slogan { color: var(--accent); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        .dashboard { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 160px); }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; position: sticky; top: 120px; height: fit-content; }
        .sector-btn { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--border); color: #8899b0; text-align: left; cursor: pointer; margin-bottom: 10px; font-family: 'Syne'; transition: 0.3s; font-size: 14px; }
        .sector-btn:hover, .sector-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.05); }

        .main-content { padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 8px; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card .symbol { color: #8899b0; font-size: 12px; font-weight: 800; }
        .card .price { font-family: 'Syne'; font-size: 28px; margin: 12px 0; color: #fff; }
        .card .name { font-size: 14px; color: #8899b0; margin-bottom: 10px; display: block; height: 40px; overflow: hidden; }
        .card .change { font-size: 14px; font-weight: bold; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .up { background: rgba(0, 212, 170, 0.1); color: var(--accent); } 
        .down { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div class="ticker">⚠️ TRADEVISION NEWS: CONFLITOS GEOPOLÍTICOS AFETAM MERCADOS -- VOLATILIDADE EM ALTA -- ENXERGUE O MERCADO ANTES DOS OUTROS.</div>
</div>

<header>
    <div class="logo">
        <h1>5️⃣ TRADE<span style="color: var(--accent);">VISION</span></h1>
        <div class="slogan">📊 “Enxergue o mercado antes dos outros.”</div>
    </div>
    <div style="text-align: right;">
        <div id="status" style="font-size: 12px; color: var(--accent); font-weight: bold;">● TERMINAL ATIVO</div>
        <div id="last-update" style="font-size: 10px; color: #55667d;">Sincronizando...</div>
    </div>
</header>

<div class="dashboard">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-content">
        <h2 id="current-sector" style="font-family: 'Syne'; font-size: 28px; color: var(--accent); margin-bottom: 30px;">Iniciando Terminal...</h2>
        <div class="grid" id="market-grid"></div>
    </div>
</div>

<script>
    // Link direto da sua planilha (Já corrigido)
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';

    const ramos = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    let todosDados = [];

    async function fetchData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').filter(row => row.trim() !== '').slice(1); 
            
            todosDados = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    ticker: cols[0]?.replace(/"/g, '').trim(),
                    nome: cols[1]?.replace(/"/g, '').trim(),
                    preco: cols[2]?.replace(/"/g, '').trim(),
                    variacao: cols[3]?.replace(/"/g, '').trim(),
                    ramo: cols[4]?.replace(/"/g, '').trim() || ""
                };
            });

            document.getElementById('last-update').innerText = "Última atualização: " + new Date().toLocaleTimeString();
            
            // Pega o setor que está selecionado agora
            const setorAtivo = document.querySelector('.sector-btn.active')?.innerText || "TECNOLOGIA";
            loadSector(setorAtivo.charAt(0) + setorAtivo.slice(1).toLowerCase());

        } catch (error) {
            console.error("Erro:", error);
        }
    }

    function init() {
        const side = document.getElementById('sidebar');
        ramos.forEach((r, index) => {
            const btn = document.createElement('button');
            btn.className = 'sector-btn' + (index === 0 ? ' active' : '');
            btn.innerText = r.toUpperCase();
            btn.onclick = () => loadSector(r, btn);
            side.appendChild(btn);
        });
        fetchData();
        setInterval(fetchData, 60000);
    }

    function loadSector(sectorName, btn) {
        if(btn) {
            document.querySelectorAll('.sector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        document.getElementById('current-sector').innerText = sectorName;
        const grid = document.getElementById('market-grid');
        grid.innerHTML = '';

        const filtrados = todosDados.filter(a => a.ramo.toLowerCase() === sectorName.toLowerCase());

        if(filtrados.length === 0) {
            grid.innerHTML = `<p style="color:#55667d">Aguardando dados para o setor ${sectorName}... Verifique a coluna E da planilha.</p>`;
            return;
        }

        filtrados.forEach(ativo => {
            const isUp = !ativo.variacao.includes('-');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="symbol">${ativo.ticker}</div>
                <div class="price">R$ ${ativo.preco}</div>
                <span class="name">${ativo.nome}</span>
                <div class="change ${isUp ? 'up' : 'down'}">
                    ${isUp ? '▲' : '▼'} ${ativo.variacao}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    init();
</script>
</body>
</html>
